<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — JobHub</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background: linear-gradient(135deg, #f4f6fb 0%, #ede9fe 50%, #e0f2fe 100%); }
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card {
      background: #fff; border: 1px solid #e4e7f0;
      border-radius: 18px; padding: 48px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 8px 40px rgba(124,58,237,0.12), 0 2px 8px rgba(0,0,0,0.06);
    }
    .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .login-logo {
      width: 42px; height: 42px; border-radius: 11px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.15rem; color: #fff; letter-spacing: -0.02em;
      box-shadow: 0 2px 10px rgba(124,58,237,0.3);
    }
    .login-brand-name { font-size: 1.25rem; font-weight: 800; color: #111827; letter-spacing: -0.02em; }
    .login-brand-name span { color: #7c3aed; }
    .login-heading { margin: 0 0 6px; font-size: 1.6rem; font-weight: 800; color: #111827; letter-spacing: -0.02em; }
    .login-sub { margin: 0 0 32px; color: #6b7280; font-size: 0.92rem; }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .login-field { display: flex; flex-direction: column; gap: 5px; }
    .login-field label { font-size: 0.83rem; font-weight: 600; color: #374151; }
    .login-field input {
      padding: 11px 14px; border: 1.5px solid #e4e7f0;
      border-radius: 8px; font: inherit; font-size: 0.93rem;
      color: #111827; background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-field input:focus {
      outline: none; border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.10);
    }
    .login-error {
      padding: 10px 14px; background: rgba(220,38,38,0.07);
      border: 1px solid rgba(220,38,38,0.2); border-radius: 7px;
      font-size: 0.85rem; color: #dc2626; display: none;
    }
    .login-error.visible { display: block; }
    .login-submit {
      margin-top: 4px; padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; border: none; border-radius: 8px;
      font: inherit; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 2px 12px rgba(124,58,237,0.3);
    }
    .login-submit:hover { opacity: 0.92; }
    .login-submit:active { transform: scale(0.99); }
    .login-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-divider { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #e4e7f0; }
    .login-divider span { font-size: 0.78rem; color: #9ca3af; white-space: nowrap; }
    .login-demo {
      padding: 12px; background: rgba(124,58,237,0.05); border: 1.5px solid rgba(124,58,237,0.15);
      border-radius: 8px; font-size: 0.82rem; color: #6b7280;
      text-align: center; line-height: 1.5;
    }
    .login-demo strong { color: #7c3aed; }
    .login-footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid #f0f0f0; text-align: center; font-size: 0.78rem; color: #9ca3af; }
    .login-loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Decorative blobs */
    .blob {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(80px); opacity: 0.35;
    }
    .blob-1 { width: 420px; height: 420px; background: #ede9fe; top: -100px; right: -80px; }
    .blob-2 { width: 320px; height: 320px; background: #dbeafe; bottom: -80px; left: -60px; }
    .login-page { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">JH</div>
        <div class="login-brand-name">Job<span>Hub</span></div>
      </div>

      <h2 class="login-heading">Welcome back</h2>
      <p class="login-sub">Sign in to access your job dashboard and resume matcher.</p>

      <form class="login-form" id="loginForm" autocomplete="off">
        <div id="loginError" class="login-error">Incorrect email or password. Try again.</div>

        <div class="login-field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="username" required />
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button type="submit" class="login-submit" id="submitBtn">Sign in</button>
      </form>

      <div class="login-divider" style="margin-top:20px;"><span>demo mode</span></div>

      <div class="login-demo">
        Any email &amp; password will sign you in.<br/>
        <strong>This is a portfolio demo — no data is sent anywhere.</strong>
      </div>

      <div class="login-footer">
        JobHub &copy; 2025 &middot; Built by Sainath Dasa
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('jh_auth')) {
      window.location.replace('index.html');
    }

    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      errEl.classList.remove('visible');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.classList.add('visible');
        return;
      }

      // Demo: any valid-looking email/password works
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="login-loading"></span>Signing in…';

      setTimeout(() => {
        const initials = email.split('@')[0].slice(0,2).toUpperCase();
        localStorage.setItem('jh_auth', JSON.stringify({
          email,
          initials,
          name: email.split('@')[0],
          ts: Date.now()
        }));
        window.location.replace('index.html');
      }, 800);
    });
  </script>
</body>
</html>
