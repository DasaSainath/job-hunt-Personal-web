name: Fetch daily jobs

on:
  # 06:00 UTC every day (roughly 11:30 AM IST / 1:00 AM CT / 2:00 AM ET)
  schedule:
    - cron: "0 6 * * *"
  # Also let you trigger it manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetcher
        run: python scripts/fetch_jobs.py

      - name: Commit updated jobs.json
        run: |
          git config user.name "job-hub-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/jobs.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily jobs refresh [$(date -u +%Y-%m-%d)]"
            git push
          fi
