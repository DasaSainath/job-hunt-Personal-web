<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sainath Dasa — Software Engineer</title>
  <meta name="description" content="Portfolio, resume, and project showcase." />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ---- Immersive hero ---- */
    .about-hero {
      position: relative; overflow: hidden;
      min-height: 380px;
      display: flex; align-items: center;
      background: linear-gradient(135deg, #060810 0%, #0d1829 35%, #091f14 65%, #10081e 100%);
      background-size: 500% 500%;
      animation: heroShift 18s ease infinite;
    }
    @keyframes heroShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* Floating orbs */
    .about-hero::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 480px 320px at 15% 60%, rgba(110,168,254,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 360px 240px at 80% 25%, rgba(123,227,181,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 260px 180px at 55% 85%, rgba(167,139,250,0.06) 0%, transparent 60%);
    }
    /* Floating particles (CSS only) */
    .particle-field {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .particle-field span {
      position: absolute; border-radius: 50%;
      background: rgba(110,168,254,0.18);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 0.4; }
      100% { transform: translateY(-260px) scale(0.3); opacity: 0; }
    }

    .hero-content {
      position: relative; z-index: 2;
      max-width: 820px; margin: 0 auto; padding: 60px 24px 52px;
      display: flex; gap: 36px; align-items: center;
    }

    /* Glass profile card */
    .hero-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 32px 36px;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      flex: 1;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 14px; border-radius: 999px;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
      background: rgba(123,227,181,0.12);
      border: 1px solid rgba(123,227,181,0.35);
      color: #7be3b5; margin-bottom: 16px;
    }
    .hero-badge .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: #7be3b5; animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .hero-role {
      font-size: 0.88rem; color: rgba(255,255,255,0.45);
      text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
      margin: 0 0 8px;
    }
    .hero-name {
      font-size: 2.8rem; font-weight: 800; letter-spacing: -0.03em;
      color: #fff; margin: 0 0 10px; line-height: 1.05;
    }
    .hero-tagline {
      font-size: 1rem; color: rgba(255,255,255,0.6);
      margin: 0 0 6px; line-height: 1.6; max-width: 480px;
    }
    .hero-location {
      font-size: 0.85rem; color: rgba(255,255,255,0.38);
      margin: 0 0 24px;
    }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .hero-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 0.88rem; font-weight: 600; color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.06);
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .hero-link:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); text-decoration: none; color: #fff; }
    .hero-link.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .hero-link.primary:hover { filter: brightness(1.12); }

    /* Avatar initials ring */
    .hero-avatar-wrap { flex-shrink: 0; }
    .hero-avatar {
      width: 110px; height: 110px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(110,168,254,0.25), rgba(123,227,181,0.25));
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; font-weight: 800; color: rgba(255,255,255,0.9);
      letter-spacing: -0.02em;
      box-shadow: 0 0 40px rgba(110,168,254,0.18);
    }

    /* Sections */
    .about-body { max-width: 820px; margin: 0 auto; padding: 0 24px 60px; }
    .about-section { padding: 36px 0; border-top: 1px solid var(--border); }
    .about-section:first-child { border-top: none; padding-top: 40px; }
    .about-section-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    }
    .about-section-head h2 { margin: 0; font-size: 1.25rem; letter-spacing: -0.01em; }
    .section-bar { width: 4px; height: 22px; border-radius: 2px; flex-shrink: 0; }
    .bar-blue { background: var(--accent); }
    .bar-green { background: var(--accent-2); }
    .bar-purple { background: #a78bfa; }
    .bar-orange { background: var(--warn); }

    /* Skills grid */
    .skills-grid { display: flex; flex-direction: column; gap: 12px; }
    .skill-row {
      display: flex; align-items: flex-start; gap: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 16px;
    }
    .skill-row-label {
      font-size: 0.75rem; color: var(--muted); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      min-width: 80px; padding-top: 2px;
    }
    .skill-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    /* Experience timeline */
    .exp-item {
      position: relative; padding-left: 20px; margin-bottom: 28px;
    }
    .exp-item::before {
      content: '';
      position: absolute; left: 0; top: 6px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--border);
    }
    .exp-item::after {
      content: '';
      position: absolute; left: 3px; top: 18px; bottom: -22px;
      width: 2px; background: var(--border);
    }
    .exp-item:last-child::after { display: none; }
    .exp-role { font-weight: 700; font-size: 1rem; margin: 0 0 2px; }
    .exp-meta { font-size: 0.85rem; color: var(--muted); margin: 0 0 10px; }
    .exp-bullets { padding-left: 16px; margin: 0; }
    .exp-bullets li { margin-bottom: 5px; font-size: 0.92rem; color: var(--text); }

    /* Project cards */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
    .project-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: border-color 0.15s, transform 0.1s;
    }
    .project-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .edu-card { margin-bottom: 10px; }
    .about-summary { line-height: 1.7; font-size: 1rem; max-width: 640px; }
    .project-name { font-weight: 700; font-size: 1rem; margin: 0 0 6px; }
    .project-name a { color: var(--text); }
    .project-name a:hover { color: var(--accent); }
    .project-desc { font-size: 0.9rem; color: var(--muted); margin: 0 0 12px; }

    @media (max-width: 680px) {
      .hero-content { flex-direction: column; gap: 24px; padding: 40px 16px 36px; }
      .hero-avatar { width: 80px; height: 80px; font-size: 1.8rem; }
      .hero-name { font-size: 2rem; }
      .about-body { padding: 0 16px 48px; }
    }
  </style>
</head>
<body>
  <script>
    (function() { if (!localStorage.getItem('jh_auth')) window.location.replace('login.html'); })();
  </script>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand"><span class="dot"></span><span id="brand-name">Portfolio</span></a>
      <div class="nav-links">
        <a href="index.html" class="active">About</a>
        <a href="jobs.html">Jobs</a>
        <a href="matcher.html">Matcher</a>
        <a href="profile.html">Profile</a>
      </div>
      <div class="nav-right">
        <div class="nav-user">
          <div class="nav-user-avatar" id="nav-avatar">SD</div>
          <span id="nav-email"></span>
        </div>
        <button type="button" class="nav-logout" id="nav-logout">Sign out</button>
      </div>
    </div>
  </nav>

  <!-- Immersive hero -->
  <div class="about-hero" id="about-hero">
    <div class="particle-field" id="particle-field"></div>
    <div class="hero-content">
      <div class="hero-avatar-wrap">
        <div class="hero-avatar" id="hero-avatar">SD</div>
      </div>
      <div class="hero-card">
        <div class="hero-badge"><span class="pulse"></span>Open to Opportunities</div>
        <p class="hero-role" id="hero-role">Software Engineer</p>
        <h1 class="hero-name" id="hero-name"></h1>
        <p class="hero-tagline" id="hero-tagline"></p>
        <p class="hero-location" id="hero-location"></p>
        <div class="hero-actions" id="hero-actions"></div>
      </div>
    </div>
  </div>

  <!-- Body sections -->
  <div class="about-body">

    <div class="about-section" id="summary-section">
      <div class="about-section-head">
        <div class="section-bar bar-blue"></div>
        <h2>Summary</h2>
      </div>
      <p id="summary-body" class="muted about-summary"></p>
    </div>

    <div class="about-section" id="skills-section">
      <div class="about-section-head">
        <div class="section-bar bar-green"></div>
        <h2>Skills</h2>
      </div>
      <div class="skills-grid" id="skills-body"></div>
    </div>

    <div class="about-section" id="experience-section">
      <div class="about-section-head">
        <div class="section-bar bar-orange"></div>
        <h2>Experience</h2>
      </div>
      <div id="experience-body"></div>
    </div>

    <div class="about-section" id="projects-section">
      <div class="about-section-head">
        <div class="section-bar bar-purple"></div>
        <h2>Projects</h2>
      </div>
      <div class="project-grid" id="projects-body"></div>
    </div>

    <div class="about-section" id="education-section">
      <div class="about-section-head">
        <div class="section-bar bar-blue"></div>
        <h2>Education</h2>
      </div>
      <div id="education-body"></div>
    </div>

  </div>

  <footer class="footer">
    Built with static HTML + JSON · <a href="jobs.html">See today's jobs →</a>
  </footer>

  <script type="module">
    import { loadResume, escapeHtml, markActiveNav } from './js/common.js';

    // Auth UI
    const auth = JSON.parse(localStorage.getItem('jh_auth') || '{}');
    document.getElementById('nav-avatar').textContent = auth.initials || 'SD';
    document.getElementById('nav-email').textContent = auth.email || '';
    document.getElementById('nav-logout').addEventListener('click', () => {
      localStorage.removeItem('jh_auth');
      window.location.replace('login.html');
    });

    markActiveNav();

    // Spawn floating particles
    function spawnParticles() {
      const field = document.getElementById('particle-field');
      const sizes = [4, 6, 8, 5, 7, 3, 10];
      const delays = [0, 2, 4, 6, 8, 10, 12, 14, 1, 3, 5, 7];
      const durations = [8, 12, 16, 10, 14, 9, 11];
      for (let i = 0; i < 14; i++) {
        const s = document.createElement('span');
        const sz = sizes[i % sizes.length];
        s.style.cssText = `
          width:${sz}px; height:${sz}px;
          left:${5 + Math.random() * 90}%;
          bottom:${-sz}px;
          animation-duration:${durations[i % durations.length]}s;
          animation-delay:${delays[i % delays.length]}s;
          opacity:0;
        `;
        field.appendChild(s);
      }
    }
    spawnParticles();

    (async () => {
      try {
        const r = await loadResume();
        document.title = `${r.name} — ${r.title}`;
        document.getElementById('brand-name').textContent = r.name;

        const initials = (r.name || 'SD').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        document.getElementById('hero-avatar').textContent = initials;
        document.getElementById('hero-name').textContent = r.name;
        document.getElementById('hero-role').textContent = r.title || 'Software Engineer';
        document.getElementById('hero-tagline').textContent = r.tagline || '';
        document.getElementById('hero-location').textContent = r.location || '';

        const actions = [];
        if (r.links?.linkedin) actions.push(`<a class="hero-link primary" href="${escapeHtml(r.links.linkedin)}" target="_blank" rel="noopener">LinkedIn ↗</a>`);
        if (r.links?.github) actions.push(`<a class="hero-link" href="${escapeHtml(r.links.github)}" target="_blank" rel="noopener">GitHub ↗</a>`);
        if (r.email) actions.push(`<a class="hero-link" href="mailto:${escapeHtml(r.email)}">${escapeHtml(r.email)}</a>`);
        if (r.links?.resume_pdf) actions.push(`<a class="hero-link" href="${escapeHtml(r.links.resume_pdf)}" target="_blank" rel="noopener">Resume PDF</a>`);
        document.getElementById('hero-actions').innerHTML = actions.join('');

        document.getElementById('summary-body').textContent = r.summary || '';

        const skillsEl = document.getElementById('skills-body');
        const groups = Object.entries(r.skills || {}).filter(([, list]) => Array.isArray(list) && list.length);
        skillsEl.innerHTML = groups.map(([group, list]) => `
          <div class="skill-row">
            <div class="skill-row-label">${escapeHtml(group)}</div>
            <div class="skill-chips">
              ${list.map(s => `<span class="chip">${escapeHtml(s)}</span>`).join('')}
            </div>
          </div>`).join('') || '<p class="muted">No skills listed.</p>';

        const expEl = document.getElementById('experience-body');
        expEl.innerHTML = (r.experience || []).map(e => `
          <div class="exp-item">
            <p class="exp-role">${escapeHtml(e.role || '')} <span class="muted">· ${escapeHtml(e.company || '')}</span></p>
            <p class="exp-meta">${escapeHtml(e.location || '')} · ${escapeHtml(e.start || '')} – ${escapeHtml(e.end || '')}</p>
            <ul class="exp-bullets">
              ${(e.bullets || []).map(b => `<li>${escapeHtml(b)}</li>`).join('')}
            </ul>
          </div>`).join('') || '<p class="muted">No experience listed yet.</p>';

        const projEl = document.getElementById('projects-body');
        projEl.innerHTML = (r.projects || []).map(p => `
          <div class="project-card">
            <p class="project-name">
              ${p.link ? `<a href="${escapeHtml(p.link)}" target="_blank" rel="noopener">${escapeHtml(p.name || '')}</a>` : escapeHtml(p.name || '')}
            </p>
            <p class="project-desc">${escapeHtml(p.description || '')}</p>
            <div class="chip-row">
              ${(p.tech || []).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('')}
            </div>
          </div>`).join('') || '<p class="muted">No projects listed.</p>';

        const eduEl = document.getElementById('education-body');
        eduEl.innerHTML = (r.education || []).map(ed => `
          <div class="card edu-card">
            <p class="card-title">${escapeHtml(ed.degree || '')}</p>
            <p class="card-sub">${escapeHtml(ed.school || '')} · ${escapeHtml(ed.location || '')} · ${escapeHtml(ed.year || '')}</p>
          </div>`).join('') || '<p class="muted">No education listed.</p>';

      } catch (err) {
        console.error(err);
        document.getElementById('hero-name').textContent = 'Error loading';
        document.getElementById('hero-tagline').textContent = err.message;
      }
    })();
  </script>
</body>
</html>
